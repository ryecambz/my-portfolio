<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gantari:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <section id="contact" class="px-4 md:px-8 mt-20 pb-20">
  <div class="max-w-3xl mx-auto bg-gray-50 p-8 rounded-2xl border border-gray-200">
    <h2 class="gantari-mainfont font-bold text-2xl mb-6">Let's Connect</h2>
    
    <form action="https://formspree.io/f/your-id" method="POST" class="space-y-4">
      <div>
        <label class="block gantari-mainfont font-bold mb-1">Name</label>
        <input type="text" name="name" required class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      
      <div>
        <label class="block gantari-mainfont font-bold mb-1">Email</label>
        <input type="email" name="email" required class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      
      <div>
        <label class="block gantari-mainfont font-bold mb-1">Message</label>
        <textarea name="message" rows="4" required class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>
      
      <button type="submit" class="bg-black text-white font-bold py-3 px-8 rounded-lg hover:bg-gray-800 transition-colors">
        Send Message
      </button>

      <a href="index.html" class="flex items-center gap-2 text-left max-w-xs text-heading gantari-mainfont group cursor-pointer">
  <span class="opacity-50 transform group-hover:translate-x-1 transition-transform duration-300"> > </span>
  
  <span class="border-b border-white/20 group-hover:border-white transition-colors duration-300 text-black">
    Go back
  </span>
  </a>
    </form>
  </div>
</section>
</body>
</html>
