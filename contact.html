<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gantari:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <section id="contact" class="w-full bg-[#0D0D0D] text-[#F2F2F2] px-6 py-32 border-t border-white/5">
  <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-16">
    
    <div class="md:col-span-5">
      <h2 class="text-xs font-mono uppercase tracking-[0.4em] text-white/30 mb-8">Interaction // Contact</h2>
      <h3 class="text-6xl md:text-7xl font-black uppercase leading-[0.8] tracking-tighter mb-8">
        Let's <br/> <span class="text-white/20 italic font-light">Connect</span>
      </h3>
      <p class="text-white/40 font-mono text-xs uppercase tracking-widest leading-relaxed">
        Available for network infrastructure design and cybersecurity consultation.
      </p>
    </div>

    <div class="md:col-span-7">
      <form action="https://formspree.io/f/xbdwrjvg" method="POST" class="space-y-12">
        
        <div class="group relative border-b border-white/10 focus-within:border-white transition-colors duration-500">
          <label class="block font-mono text-[10px] uppercase tracking-widest text-white/20 group-focus-within:text-cyan-500 transition-colors">01 // Name</label>
          <input type="text" name="name" placeholder="John Doe" required 
                 class="w-full bg-transparent py-4 text-2xl outline-none placeholder:text-white/5 font-light tracking-tight">
        </div>
        
        <div class="group relative border-b border-white/10 focus-within:border-white transition-colors duration-500">
          <label class="block font-mono text-[10px] uppercase tracking-widest text-white/20 group-focus-within:text-cyan-500 transition-colors">02 // Email Address</label>
          <input type="email" name="email" placeholder="email@example.com" required 
                 class="w-full bg-transparent py-4 text-2xl outline-none placeholder:text-white/5 font-light tracking-tight">
        </div>
        
        <div class="group relative border-b border-white/10 focus-within:border-white transition-colors duration-500">
          <label class="block font-mono text-[10px] uppercase tracking-widest text-white/20 group-focus-within:text-cyan-500 transition-colors">03 // Project Details</label>
          <textarea name="message" rows="1" required placeholder="Briefly describe the scope..."
                    class="w-full bg-transparent py-4 text-2xl outline-none placeholder:text-white/5 font-light tracking-tight resize-none"></textarea>
        </div>
        
        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-8 pt-8">
          <button type="submit" 
                  class="group relative px-12 py-4 bg-white text-black font-bold uppercase text-xs tracking-widest hover:bg-cyan-500 transition-all duration-300">
            Submit_Request
          </button>

          <a href="index.html" class="group flex items-center gap-2 font-mono text-[10px] uppercase tracking-widest text-white/40 hover:text-white transition-colors">
            <span class="group-hover:-translate-x-1 transition-transform"> < </span>
            <span class="border-b border-transparent group-hover:border-white pb-1">Return to Archive</span>
          </a>
        </div>

      </form>
    </div>
  </div>
</section>
</body>
</html>
